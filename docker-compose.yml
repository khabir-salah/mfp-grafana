version: "3.9"

networks:
  mfp-net:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:
  app-uploads:
  app-logs:

services:

  postgres:
    image: postgres:16-alpine
    container_name: mfp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-mfp_data}
      POSTGRES_USER:     ${POSTGRES_USER:-mfp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mfp_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mfp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mfp_user} -d ${POSTGRES_DB:-mfp_data}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "127.0.0.1:5432:5432"

  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mfp-webapp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-mfp_data};Username=${POSTGRES_USER:-mfp_user};Password=${POSTGRES_PASSWORD:-mfp_password};Pooling=true;Minimum Pool Size=2;Maximum Pool Size=20;"
      GrafanaSettings__BaseUrl: ${GRAFANA_URL:-http://localhost/grafana}
      UploadSettings__UploadPath: /app/uploads
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/app/logs
    networks:
      - mfp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/upload/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  grafana:
    image: grafana/grafana:11.1.0
    container_name: mfp-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - mfp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: mfp-nginx
    restart: unless-stopped
    depends_on:
      - webapp
      - grafana
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - mfp-net
