apiVersion: 1

providers:
  - name: MFP Dashboards
    orgId: 1
    folder: MyFitnessPal
    folderUid: mfp-folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
